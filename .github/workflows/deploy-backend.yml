name: Deploy Backend to Azure App Service

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: hydonlineshopping-eudpf8f4h5dgbwcs
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore backend/HyderabadBazaar.API/HyderabadBazaar.API.csproj

      - name: Build
        run: dotnet build backend/HyderabadBazaar.API/HyderabadBazaar.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish backend/HyderabadBazaar.API/HyderabadBazaar.API.csproj --configuration Release --output ./publish

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

      - name: Logout from Azure
        run: az logout
        if: always()
