# Render Blueprint — provisions BOTH the API and a managed PostgreSQL
# database, wired together automatically. One click deploys everything.
databases:
  - name: hyderabad-db
    plan: free
    databaseName: hyderabadonlineshopping
    user: hyderabad
    region: oregon

services:
  - type: web
    name: hyderabad-online-shopping-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/HyderabadBazaar.API/Dockerfile
    dockerContext: ./backend/HyderabadBazaar.API
    healthCheckPath: /api/categories
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # DATABASE_URL is injected automatically from the database above —
      # no manual copy/paste needed.
      - key: DATABASE_URL
        fromDatabase:
          name: hyderabad-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true   # Render generates a strong random secret
      - key: Jwt__Issuer
        value: HyderabadOnlineShoppingAPI
      - key: Jwt__Audience
        value: HyderabadOnlineShoppingClient
