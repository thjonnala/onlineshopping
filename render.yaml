# Render Blueprint — deploys the API as a Docker web service.
# The database is hosted externally on Neon (the shared "thiruapps" DB).
#
# Setup:
#  1. Create a free Postgres at neon.tech, database name "thiruapps".
#  2. Apply the schema once from the thiru-apps-db repo (hos_-prefixed):
#       .\apply.ps1 -ConnectionString "<Neon connection string>"
#  3. Deploy this blueprint, then set DATABASE_URL on the service to the
#     Neon connection string (Render dashboard → Environment).
# (The app does NOT auto-migrate — thiru-apps-db owns the schema.)

services:
  - type: web
    name: hyderabad-online-shopping-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/HyderabadBazaar.API/Dockerfile
    dockerContext: ./backend/HyderabadBazaar.API
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Set this in the Render dashboard to your Neon connection string.
      - key: DATABASE_URL
        sync: false
      - key: Jwt__Key
        generateValue: true   # Render generates a strong random secret
      - key: Jwt__Issuer
        value: HyderabadOnlineShoppingAPI
      - key: Jwt__Audience
        value: HyderabadOnlineShoppingClient
