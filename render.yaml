# Render Blueprint — provisions BOTH the API and a managed PostgreSQL
# database, wired together automatically.
#
# The database is the shared "thiruapps" DB. After it is created, apply the
# schema once from the thiru-apps-db repo (objects are hos_-prefixed):
#   .\apply.ps1 -ConnectionString "<DATABASE_URL from Render>"
# (The app does NOT auto-migrate — thiru-apps-db owns the schema.)
databases:
  - name: thiruapps-db
    plan: free
    databaseName: thiruapps
    user: thiruapps
    region: oregon

services:
  - type: web
    name: hyderabad-online-shopping-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/HyderabadBazaar.API/Dockerfile
    dockerContext: ./backend/HyderabadBazaar.API
    healthCheckPath: /api/categories
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # DATABASE_URL is injected automatically from the database above —
      # no manual copy/paste needed.
      - key: DATABASE_URL
        fromDatabase:
          name: thiruapps-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true   # Render generates a strong random secret
      - key: Jwt__Issuer
        value: HyderabadOnlineShoppingAPI
      - key: Jwt__Audience
        value: HyderabadOnlineShoppingClient
